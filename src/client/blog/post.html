<html lang="en">

    <title>Post</title>
</head>
<body>
    <div id="post">
        <div id="post__header">
            <div id="category"></div>
            <div id="title"></div>

        </div>
    </div>
    <script type="module" src="/source/blog/post.js"></script>

</html>
